<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>硬核行动预测终端</title>
  
  <!-- 引入 Tailwind CSS 进行样式渲染 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 实时编译 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950">
  <div id="root"></div>

  <!-- 注意这里的 type="text/babel" -->
  <script type="text/babel">
    const { useState } = React;

    // 自定义图标组件 (替代 lucide-react，确保无外部依赖)
    const Settings = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    );
    const Zap = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    );
    const Crosshair = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/>
      </svg>
    );
    const AlertTriangle = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    );

    const options = [
      '吃🥛',
      '耸动',
      '一蹶不振',
      '喝tumeric shots',
      '加班 ing'
    ];

    // 金属铆钉组件
    const Rivet = ({ className }) => (
      <div className={`absolute w-5 h-5 rounded-full bg-gray-500 shadow-[inset_1px_1px_2px_#e5e7eb,inset_-2px_-2px_4px_#1f2937,0_2px_4px_rgba(0,0,0,0.5)] border border-gray-800 flex items-center justify-center ${className}`}>
        <div className="w-full h-[2px] bg-gray-800 rotate-45 shadow-[inset_0_1px_0_rgba(255,255,255,0.3)]"></div>
      </div>
    );

    function App() {
      const [rotation, setRotation] = useState(0);
      const [isSpinning, setIsSpinning] = useState(false);
      const [result, setResult] = useState(null);
      const [scanEffect, setScanEffect] = useState(false);

      const spin = () => {
        if (isSpinning) return;

        setResult(null);
        setIsSpinning(true);
        setScanEffect(true);

        // 基础旋转圈数 (至少转5圈) + 随机角度
        const extraSpins = 5 * 360;
        const randomAngle = Math.floor(Math.random() * 360);
        const newRotation = rotation + extraSpins + randomAngle;

        setRotation(newRotation);

        // 计算结果逻辑
        const pointedAngle = (360 - (newRotation % 360)) % 360;
        const index = Math.floor((pointedAngle + 36) / 72) % 5;

        // 等待旋转动画结束 (4秒)
        setTimeout(() => {
          setResult(options[index]);
          setIsSpinning(false);
          setScanEffect(false);
        }, 4000);
      };

      return (
        <div className="min-h-screen bg-neutral-950 flex flex-col items-center justify-center p-4 font-sans overflow-hidden relative selection:bg-red-500 selection:text-white">
          {/* 工业风背景网格与渐变 */}
          <div className="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none"></div>
          <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,#0a0a0a_100%)] pointer-events-none"></div>

          {/* 主控台面板 */}
          <div className="relative w-full max-w-md bg-gradient-to-b from-gray-700 via-gray-800 to-gray-900 border-[12px] border-gray-600 rounded-3xl shadow-[0_30px_50px_rgba(0,0,0,0.8),inset_0_0_20px_rgba(0,0,0,0.5)] p-8">
            
            {/* 四角铆钉 */}
            <Rivet className="top-2 left-2" />
            <Rivet className="top-2 right-2" />
            <Rivet className="bottom-2 left-2" />
            <Rivet className="bottom-2 right-2" />

            {/* 标题栏 */}
            <div className="text-center mb-8 border-b-4 border-gray-600 pb-4 relative">
              <div className="flex items-center justify-center gap-2 text-gray-400 text-sm font-black tracking-[0.2em] mb-2 uppercase">
                <Settings className="w-4 h-4 animate-[spin_4s_linear_infinite]" />
                核心推演终端 v9.0
                <Settings className="w-4 h-4 animate-[spin_4s_linear_infinite_reverse]" />
              </div>
              <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-400 tracking-wider drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">
                目标行动预测
              </h1>
              <div className="absolute -bottom-[3px] left-1/2 -translate-x-1/2 w-1/3 h-[4px] bg-red-600 shadow-[0_0_10px_#dc2626]"></div>
            </div>

            {/* 轮盘区域容器 */}
            <div className="relative flex justify-center items-center mb-10">
              
              {/* 指针 (重金属风格) */}
              <div className="absolute top-[-25px] left-1/2 -translate-x-1/2 z-20 flex flex-col items-center drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]">
                <div className="w-8 h-4 bg-gray-300 border-2 border-gray-800 rounded-t-md"></div>
                <div className="w-0 h-0 border-l-[16px] border-l-transparent border-r-[16px] border-r-transparent border-t-[32px] border-t-red-600 border-b-0"></div>
                {/* 指示灯 */}
                <div className={`absolute top-2 w-2 h-2 rounded-full ${isSpinning ? 'bg-red-500 shadow-[0_0_10px_#ef4444] animate-pulse' : 'bg-red-900'}`}></div>
              </div>

              {/* 轮盘本体 */}
              <div className="relative w-72 h-72 md:w-80 md:h-80 rounded-full shadow-[0_0_0_12px_#374151,0_0_0_16px_#1f2937,0_0_30px_10px_rgba(0,0,0,0.7)]">
                
                {/* 扇形切片背景 */}
                <div 
                  className="absolute inset-0 rounded-full w-full h-full overflow-hidden"
                  style={{
                    background: `conic-gradient(from -36deg, 
                      #27272a 0 72deg, 
                      #3f3f46 72deg 144deg, 
                      #27272a 144deg 216deg, 
                      #3f3f46 216deg 288deg, 
                      #b45309 288deg 360deg)`,
                    transform: `rotate(${rotation}deg)`,
                    transition: 'transform 4s cubic-bezier(0.15, 0.8, 0.1, 1)'
                  }}
                >
                  {/* 扇形边缘分割线 */}
                  {[0, 1, 2, 3, 4].map((i) => (
                    <div 
                      key={`line-${i}`} 
                      className="absolute top-0 left-1/2 w-[2px] h-1/2 bg-gray-800 origin-bottom"
                      style={{ transform: `rotate(${i * 72 + 36}deg)` }}
                    />
                  ))}

                  {/* 选项文本渲染 */}
                  {options.map((opt, i) => (
                    <div 
                      key={i} 
                      className="absolute top-0 left-0 w-full h-full pointer-events-none"
                      style={{ transform: `rotate(${i * 72}deg)` }}
                    >
                      <div 
                        className={`absolute top-6 left-1/2 -translate-x-1/2 font-black ${opt.length > 5 ? 'text-sm' : 'text-lg'} tracking-widest flex flex-col items-center justify-start`}
                        style={{ 
                          writingMode: 'vertical-rl', 
                          textShadow: '2px 2px 4px rgba(0,0,0,0.9), -1px -1px 0 rgba(255,255,255,0.1)',
                          color: i === 4 ? '#fef3c7' : '#f4f4f5',
                          height: '40%'
                        }}
                      >
                        {opt === '加班 ing' ? (
                          <span className="flex items-center gap-1">
                            <AlertTriangle className="w-3 h-3 text-yellow-400 rotate-90" />
                            {opt}
                          </span>
                        ) : (
                          opt
                        )}
                      </div>
                    </div>
                  ))}
                  
                  {/* 轮盘中心轴承 */}
                  <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 rounded-full bg-gradient-to-br from-gray-400 to-gray-700 shadow-[0_5px_15px_rgba(0,0,0,0.8),inset_0_2px_4px_rgba(255,255,255,0.5)] border-4 border-gray-800 flex items-center justify-center z-10">
                    <div className="w-8 h-8 rounded-full bg-gray-800 shadow-[inset_0_3px_5px_rgba(0,0,0,0.8)] border border-gray-600 flex items-center justify-center">
                      <div className="w-2 h-2 rounded-full bg-gray-500"></div>
                    </div>
                  </div>

                </div>
              </div>
            </div>

            {/* 状态监控屏幕 */}
            <div className="relative mb-8 bg-[#0a0f0a] border-4 border-gray-700 rounded-lg p-4 shadow-[inset_0_0_20px_rgba(0,0,0,1)] flex items-center justify-center h-24 overflow-hidden">
              <div className="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-transparent pointer-events-none"></div>
              
              {scanEffect && (
                <div className="absolute inset-0 bg-red-500/10 animate-pulse pointer-events-none"></div>
              )}

              <div className="text-center font-mono font-bold tracking-widest relative z-10">
                <div className="text-gray-500 text-xs mb-1 uppercase flex items-center justify-center gap-1">
                  <Crosshair className="w-3 h-3" />
                  Sensor Readout
                </div>
                {isSpinning ? (
                  <span className="text-yellow-500 text-xl animate-pulse">CALCULATING...</span>
                ) : result ? (
                  <span className="text-red-500 text-2xl drop-shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-[bounce_0.5s_ease-out]">
                    {result}
                  </span>
                ) : (
                  <span className="text-green-600 text-xl opacity-70">AWAITING INPUT</span>
                )}
              </div>
            </div>

            {/* 强制启动按钮 */}
            <button
              onClick={spin}
              disabled={isSpinning}
              className={`w-full relative overflow-hidden group rounded-xl border-b-8 font-black text-xl tracking-[0.2em] py-5 uppercase transition-all duration-200 ${
                isSpinning 
                  ? 'bg-[repeating-linear-gradient(45deg,#374151,#374151_15px,#1f2937_15px,#1f2937_30px)] text-gray-500 border-gray-900 translate-y-2 cursor-not-allowed shadow-[inset_0_4px_8px_rgba(0,0,0,0.6)]' 
                  : 'bg-gradient-to-b from-gray-300 to-gray-500 text-gray-900 border-gray-700 hover:from-white hover:to-gray-400 active:translate-y-2 active:border-b-0 shadow-[0_10px_20px_rgba(0,0,0,0.5)]'
              }`}
            >
              {!isSpinning && (
                 <div className="absolute top-0 left-0 w-full h-1/2 bg-white/20 rounded-t-xl pointer-events-none"></div>
              )}
              
              <span className="relative z-10 flex items-center justify-center gap-3 drop-shadow-md">
                {isSpinning ? (
                  <>
                    <Zap className="w-6 h-6 animate-bounce text-yellow-600" />
                    执行中...
                  </>
                ) : (
                  <>
                    <Zap className="w-6 h-6 text-red-600 group-hover:scale-110 transition-transform" />
                    强制提取指令
                  </>
                )}
              </span>
            </button>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
